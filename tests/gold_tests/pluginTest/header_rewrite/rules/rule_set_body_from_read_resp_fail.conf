# Attempt to replace the body from a URL whose backend is unreachable.
# ATS generates an error page for the unreachable backend; the FetchSM
# treats this as a successful fetch and replaces the origin body with
# the ATS error page content. The origin status code (e.g. 404) is preserved.
cond %{READ_RESPONSE_HDR_HOOK}
  set-body-from http://www.example.com/no_server
