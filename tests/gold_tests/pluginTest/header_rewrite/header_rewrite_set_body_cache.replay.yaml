meta:
  version: "1.0"

# Test that set-body replacement does NOT get stored in cache.
# With caching enabled:
# 1. First request: origin returns 403 with sensitive body, set-body replaces it
# 2. Second request: should go to origin again (not serve cached replacement)

autest:
  description: 'Test set-body does not cache replacement body'

  dns:
    name: 'dns'

  server:
    name: 'server'

  client:
    name: 'client'
    process_config:
      other_args: '--thread-limit 1'

  ats:
    name: 'ts'

    copy_to_config_dir:
      - 'rules'

    records_config:
      proxy.config.http.insert_response_via_str: 0
      proxy.config.http.cache.http: 1
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'http|header_rewrite'

    remap_config:
      # set-body replaces origin body; cache is enabled
      - from: "http://www.example.com/set_body_cache_test/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/origin_cacheable/"
        plugins:
          - name: "header_rewrite.so"
            args:
              - "rules/rule_set_body_origin_read_resp.conf"

sessions:

# Request 1: First request to populate. Origin returns 403 with cacheable headers.
# set-body replaces the body. The replacement should NOT be cached.
- transactions:
  - client-request:
      method: "GET"
      version: "1.1"
      url: /set_body_cache_test/page1
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, cache-1 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "28" ]
        - [ Content-Type, "text/plain" ]
        - [ Cache-Control, "max-age=300" ]
      content:
        size: 28
        data: "Sensitive: secret-key-99999!"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

# Request 2: Same URL. If set-body replacement was cached, the origin would
# not be contacted. The server-response block ensures the origin IS contacted
# (proxy-verifier will fail if the server-response is not used).
- transactions:
  - client-request:
      method: "GET"
      version: "1.1"
      url: /set_body_cache_test/page1
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, cache-2 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "28" ]
        - [ Content-Type, "text/plain" ]
        - [ Cache-Control, "max-age=300" ]
      content:
        size: 28
        data: "Sensitive: secret-key-99999!"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"
