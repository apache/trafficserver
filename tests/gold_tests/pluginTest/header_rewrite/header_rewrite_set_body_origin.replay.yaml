meta:
  version: "1.0"

autest:
  description: 'Test set-body origin replacement without response transforms'

  dns:
    name: 'dns'

  server:
    name: 'server'

  client:
    name: 'client'
    process_config:
      other_args: '--thread-limit 1'

  ats:
    name: 'ts'

    plugin_config:
      - null_transform.so

    copy_to_config_dir:
      - 'rules'

    records_config:
      proxy.config.http.insert_response_via_str: 0
      proxy.config.http.cache.http: 0
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'http|header_rewrite'

    remap_config:
      # Block 1: READ_RESPONSE hook replacement path (no transform plugin).
      - from: "http://www.example.com/set_body_read_resp_403/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/origin_read_403/"
        plugins:
          - name: "header_rewrite.so"
            args:
              - "rules/rule_set_body_origin_read_resp.conf"

      # Block 2: SEND_RESPONSE hook replacement path (no transform plugin).
      - from: "http://www.example.com/set_body_send_resp_403/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/origin_send_403/"
        plugins:
          - name: "header_rewrite.so"
            args:
              - "rules/rule_set_body_origin_send_resp.conf"

      # Block 3a: cache-bypass probe for READ_RESPONSE hook (same URL twice).
      - from: "http://www.example.com/cache_probe_read/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/cache_probe_read/"
        plugins:
          - name: "header_rewrite.so"
            args:
              - "rules/rule_set_body_origin_read_resp.conf"

      # Block 3b: cache-bypass probe for SEND_RESPONSE hook (same URL twice).
      - from: "http://www.example.com/cache_probe_send/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/cache_probe_send/"
        plugins:
          - name: "header_rewrite.so"
            args:
              - "rules/rule_set_body_origin_send_resp.conf"

      # Block 4a: READ_RESPONSE hook with response transform plugin active.
      - from: "http://www.example.com/set_body_transform_read/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/origin_transform_read/"
        plugins:
          - name: "header_rewrite.so"
            args:
              - "rules/rule_set_body_origin_read_resp.conf"

      # Block 4b: SEND_RESPONSE hook with response transform plugin active.
      - from: "http://www.example.com/set_body_transform_send/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/origin_transform_send/"
        plugins:
          - name: "header_rewrite.so"
            args:
              - "rules/rule_set_body_origin_send_resp.conf"

sessions:

- transactions:
  # Block 1 verification: READ_RESPONSE hook replacement.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /set_body_read_resp_403/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 1 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "40" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 40
        data: "Sensitive account info: secret-key-12345"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
        - [ Content-Type, { value: "text/html", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

  # Block 2 verification: SEND_RESPONSE hook replacement.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /set_body_send_resp_403/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 2 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "40" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 40
        data: "Sensitive account info: secret-key-12345"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
        - [ Content-Type, { value: "text/html", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

  # Block 3a verification: cache-bypass probe for READ_RESPONSE.
  # First response on repeated URL.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /cache_probe_read/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 3 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "5" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 5
        data: "first"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

  # Block 3a verification: cache-bypass probe for READ_RESPONSE.
  # Second response on repeated URL should still be replaced.
  # Keep this as non-200 so null_transform does not engage.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /cache_probe_read/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 4 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "6" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 6
        data: "second"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

  # Block 3b verification: cache-bypass probe for SEND_RESPONSE.
  # First response on repeated URL.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /cache_probe_send/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 5 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "5" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 5
        data: "first"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

  # Block 3b verification: cache-bypass probe for SEND_RESPONSE.
  # Second response on repeated URL should still be replaced.
  # Keep this as non-200 so null_transform does not engage.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /cache_probe_send/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 6 ]

    server-response:
      status: 403
      reason: Forbidden
      headers:
        fields:
        - [ Content-Length, "6" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 6
        data: "second"

    proxy-response:
      status: 403
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

  # Block 4a verification: READ_RESPONSE with transform plugin active.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /set_body_transform_read/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 7 ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, "40" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 40
        data: "Sensitive account info: secret-key-12345"

    proxy-response:
      status: 200
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"

  # Block 4b verification: SEND_RESPONSE with transform plugin active.
  - client-request:
      method: "GET"
      version: "1.1"
      url: /set_body_transform_send/
      headers:
        fields:
        - [ Host, www.example.com ]
        - [ uuid, 8 ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, "40" ]
        - [ Content-Type, "text/plain" ]
      content:
        size: 40
        data: "Sensitive account info: secret-key-12345"

    proxy-response:
      status: 200
      headers:
        fields:
        - [ Content-Length, { value: "9", as: equal } ]
      content:
        size: 9
        data: "Sanitized"
