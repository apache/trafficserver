meta:
  version: "1.0"

sessions:
- protocol:
    stack: https
    tls:
      sni: "alpha"
  transactions:
  - client-request:
      method: "GET"
      url: "/alpha"
      headers:
        fields:
        - [ Host, "base.ex" ]
        - [ UUID , "alpha clean" ]
    proxy-request:
      expect: absent
    proxy-response:
      status: 200

  - client-request:
      method: "GET"
      url: "/alpha"
      headers:
        fields:
        - [ Host, "base.ex" ]
        - [ UUID , "alpha auth" ]
        - [ Authorization , "invalid" ]
    proxy-request:
      expect: absent
    proxy-response:
      status: 200
