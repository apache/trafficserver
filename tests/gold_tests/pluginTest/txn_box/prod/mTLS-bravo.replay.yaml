meta:
  version: "1.0"

sessions:
- protocol:
    stack: https
    tls:
      sni: "bravo"
  transactions:
  - client-request:
      method: "GET"
      url: "/bravo"
      headers:
        fields:
        - [ Host, "base.ex" ]
        - [ UUID , "bravo clean" ]
    proxy-request:
      expect: absent
    proxy-response:
      status: 200

  - client-request:
      method: "GET"
      url: "/bravo"
      headers:
        fields:
        - [ Host, "base.ex" ]
        - [ UUID , "bravo auth" ]
        - [ Authorization , "alpha" ]
    proxy-request:
      expect: absent
    proxy-response:
      status: 200

  - client-request:
      method: "PROPFIND"
      url: "/bravo"
      headers:
        fields:
        - [ Host, "base.ex" ]
        - [ UUID , "bravo propfind" ]
    proxy-request:
      expect: absent
    proxy-response:
      status: 418
