meta:
  version: "1.0"

  blocks:
  - 200_ok_response: &200_ok_response
      server-response:
        status: 200
        reason: OK
        headers:
          fields:
          - [ Content-Length, 16 ]
          - [ Connection, close ]

sessions:
- transactions:
  - client-request:
      method: GET
      url: /one
      version: 1.1
      headers:
        fields:
        - [ Host, www.notls.com ]
        - [ X-Request-1, ultra_sensitive ]
        - [ Content-Length, 0 ]
        - [ uuid, 1 ]

    proxy-request:
      headers:
        fields:
        - [ X-Request-1, { value: ultra_sensitive, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        - [ Set-Cookie, classified_not_for_logging ]

- transactions:
  - client-request:
      method: GET
      url: /two
      version: 1.1
      headers:
        fields:
        - [ Host, www.notls.com ]
        - [ X-Request-2, also_very_sensitive ]
        - [ Content-Length, 0 ]
        - [ uuid, 2 ]

    proxy-request:
      headers:
        fields:
        - [ X-Request-2, { value: also_very_sensitive, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        - [ Set-Cookie, classified_not_for_logging ]

- transactions:
  - client-request:
      method: GET
      url: "http://www.some.host.com/candy"
      version: 1.1
      headers:
        fields:
        - [ Host, www.some.host.com ]
        - [ Content-Length, 0 ]
        - [ uuid, 3 ]

    proxy-request:
      url:
      - [ scheme, { as: absent } ]
      - [ host, { as: absent } ]
      - [ path, { value: /candy, as: equal } ]
      headers:
        fields:
        - [ Host, { value: www.some.host.com, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        - [ Set-Cookie, classified_not_for_logging ]

- transactions:
  - client-request:
      method: POST
      url: /post/with/body
      version: 1.1
      headers:
        fields:
        - [ Host, www.notls.com ]
        - [ Content-Length, 12345 ]
        - [ uuid, 4 ]

    proxy-request:
      url:
      - [ path, { value: /post/with/body, as: equal } ]
      headers:
        fields:
        - [ Host, { value: www.notls.com, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        - [ Set-Cookie, classified_not_for_logging ]

- transactions:
  - client-request:
      method: GET
      url: /expect/this/to/be/cached
      version: 1.1
      headers:
        fields:
        - [ Host, www.notls.com ]
        - [ Content-Length, 0 ]
        - [ uuid, 5 ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 16 ]
        - [ Cache-Control, max-age=300 ]

- transactions:
  - client-request:
      method: GET
      url: /first
      version: 1.1
      headers:
        fields:
        - [ Host, www.notls.com ]
        - [ Content-Length, 0 ]
        - [ uuid, 7 ]

    <<: *200_ok_response

  - client-request:
      method: GET
      url: /second
      version: 1.1
      headers:
        fields:
        - [ Host, www.notls.com ]
        - [ Content-Length, 0 ]
        - [ uuid, 8 ]

    <<: *200_ok_response

- protocol: [ {name: tls, sni: www.tls.com },
              {name: tcp },
              {name: ip} ]

  transactions:
  - client-request:
      method: GET
      url: /tls
      version: 1.1
      headers:
        fields:
        - [ Host, www.tls.com ]
        - [ Content-Length, 0 ]
        - [ uuid, 9 ]

    <<: *200_ok_response

- protocol: [ {name: http, version: 2},
              {name: tls, sni: www.tls.com},
              {name: tcp},
              {name: ip} ]

  transactions:
  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, www.tls.com ]
        - [ :path, /h2_first ]
        - [ uuid, 10 ]

    <<: *200_ok_response

  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, www.tls.com ]
        - [ :path, /h2_second ]
        - [ uuid, 11 ]

    <<: *200_ok_response

- protocol: [ {name: tls, sni: www.client_only_tls.com},
              {name: tcp},
              {name: ip} ]

  transactions:
  - client-request:
      method: GET
      url: /client_only_tls
      version: 1.1
      headers:
        fields:
        - [ Host, www.client_only_tls.com ]
        - [ Content-Length, 0 ]
        - [ uuid, 12 ]

    <<: *200_ok_response
