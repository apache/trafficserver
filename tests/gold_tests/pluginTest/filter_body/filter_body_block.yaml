# Configuration for blocking requests with XXE patterns
rules:
  - name: "xxe_detection"
    direction: request
    action: [log, block]
    methods: [POST]
    headers:
      - name: "Content-Type"
        patterns:
          - "application/xml"
          - "text/xml"
    body_patterns:
      - "<!ENTITY"
      - "SYSTEM"

