# Used by: remap JA4H test.
#
# Two HTTP sessions reach the same origin server, but through different
# remap rules:
#   jax-no-plugin.server.test  – no jax_fingerprint plugin configured
#   jax.server.test            – jax_fingerprint plugin with JA4H method
#
# The plugin must add fingerprint headers only for the second route.

meta:
  version: "1.0"

sessions:

# Session 1: request to the route without the plugin – no fingerprint headers.
- protocol:
  - name: http
    version: 1
  - name: tcp
  - name: ip

  transactions:

  - client-request:
      method: GET
      url: /resource
      version: '1.1'
      headers:
        fields:
        - [ Host, jax-no-plugin.server.test ]
        - [ Content-Length, 0 ]
        - [ uuid, remap-no-plugin-request ]

    # No plugin on this route – headers must be absent.
    proxy-request:
      headers:
        fields:
        - [ x-jax, { as: absent } ]
        - [ x-jax-via, { as: absent } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 9 ]
        - [ Connection, close ]
      content:
        encoding: plain
        data: "No plugin"

    proxy-response:
      status: 200

# Session 2: request to the route with the plugin – fingerprint headers added.
- protocol:
  - name: http
    version: 1
  - name: tcp
  - name: ip

  transactions:

  - client-request:
      method: GET
      url: /resource
      version: '1.1'
      headers:
        fields:
        - [ Host, jax.server.test ]
        - [ Content-Length, 0 ]
        - [ uuid, remap-plugin-request ]

    # Plugin is active for this route – both headers must be present.
    proxy-request:
      headers:
        fields:
        - [ x-jax, { as: present } ]
        - [ x-jax-via, { value: 'test.proxy.test', as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 11 ]
        - [ Connection, close ]
      content:
        encoding: plain
        data: "With plugin"

    proxy-response:
      status: 200
