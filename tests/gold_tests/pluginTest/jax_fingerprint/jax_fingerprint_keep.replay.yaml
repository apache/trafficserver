# Used by: global JA4H keep mode test.
#
# The jax_fingerprint plugin is loaded globally with --method JA4H
# --standalone --mode keep.
#
# keep mode: if the fingerprint header (x-jax) or via header (x-jax-via)
# is already present on the incoming request, the plugin must leave them
# unchanged.  If they are absent the plugin sets them as usual.

meta:
  version: "1.0"

sessions:

# Session 1: no pre-existing headers – plugin adds them (same as overwrite).
- protocol:
  - name: http
    version: 1
  - name: tcp
  - name: ip

  transactions:

  - client-request:
      method: GET
      url: /resource-no-header
      version: '1.1'
      headers:
        fields:
        - [ Host, jax.server.test ]
        - [ Content-Length, 0 ]
        - [ uuid, keep-no-existing-header ]

    # Headers were absent – plugin must set them.
    proxy-request:
      headers:
        fields:
        - [ x-jax, { as: present } ]
        - [ x-jax-via, { value: 'test.proxy.test', as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 2 ]
        - [ Connection, close ]
      content:
        encoding: plain
        data: "OK"

    proxy-response:
      status: 200

# Session 2: pre-existing headers present – keep mode must preserve them.
- protocol:
  - name: http
    version: 1
  - name: tcp
  - name: ip

  transactions:

  - client-request:
      method: GET
      url: /resource-with-header
      version: '1.1'
      headers:
        fields:
        - [ Host, jax.server.test ]
        - [ Content-Length, 0 ]
        - [ uuid, keep-existing-header ]
        - [ x-jax, upstream-fingerprint ]
        - [ x-jax-via, upstream-via ]

    # keep mode: original upstream values must be forwarded unchanged.
    proxy-request:
      headers:
        fields:
        - [ x-jax, { value: 'upstream-fingerprint', as: equal } ]
        - [ x-jax-via, { value: 'upstream-via', as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 2 ]
        - [ Connection, close ]
      content:
        encoding: plain
        data: "OK"

    proxy-response:
      status: 200
