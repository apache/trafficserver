# Used by: remap JA3 standalone test AND hybrid JA4 test.
#
# Two TLS sessions reach the same origin server through different remap rules:
#   jax-no-plugin.server.test  – no jax_fingerprint plugin for this route
#   jax.server.test            – jax_fingerprint plugin active for this route
#
# For the remap+standalone test: the remap plugin registers the
# SSL_CLIENT_HELLO_HOOK globally (--standalone) so it can populate the
# vconn context that TSRemapDoRemap later reads.
#
# For the hybrid test: a global plugin (no --standalone) captures the TLS
# client hello and stores context on the vconn; a remap plugin (no
# --standalone) reads that shared context and writes headers only for the
# matched route.
#
# In both cases the first session must have no fingerprint headers and the
# second session must have them.

meta:
  version: "1.0"

sessions:

# Session 1: TLS request to route without plugin – no fingerprint headers.
- protocol:
  - name: tls
    sni: jax-no-plugin.server.test
  - name: tcp
  - name: ip

  transactions:

  - client-request:
      method: GET
      url: /resource
      version: '1.1'
      headers:
        fields:
        - [ Host, jax-no-plugin.server.test ]
        - [ Content-Length, 0 ]
        - [ uuid, remap-tls-no-plugin-request ]

    # No plugin on this route – headers must be absent.
    proxy-request:
      headers:
        fields:
        - [ x-jax, { as: absent } ]
        - [ x-jax-via, { as: absent } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 9 ]
        - [ X-Response, remap-tls-no-plugin-response ]
        - [ Connection, close ]

    proxy-response:
      status: 200
      headers:
        fields:
        - [ X-Response, { value: 'remap-tls-no-plugin-response', as: equal } ]

# Session 2: TLS request to route with plugin – fingerprint headers added.
- protocol:
  - name: tls
    sni: jax.server.test
  - name: tcp
  - name: ip

  transactions:

  - client-request:
      method: GET
      url: /resource
      version: '1.1'
      headers:
        fields:
        - [ Host, jax.server.test ]
        - [ Content-Length, 0 ]
        - [ uuid, remap-tls-plugin-request ]

    # Plugin is active for this route – both headers must be present.
    proxy-request:
      headers:
        fields:
        - [ x-jax, { as: present } ]
        - [ x-jax-via, { value: 'test.proxy.test', as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, 11 ]
        - [ X-Response, remap-tls-plugin-response ]
        - [ Connection, close ]

    proxy-response:
      status: 200
      headers:
        fields:
        - [ X-Response, { value: 'remap-tls-plugin-response', as: equal } ]
