# This replays healthy HTTP/2 requests to verify their logging.

meta:
  version: "1.0"

sessions:
  - protocol:
      stack: http2
      tls:
        sni: www.example.com
    transactions:
      - client-request:
          headers:
            encoding: esc_json
            fields:
              - [ :method, GET ]
              - [ :scheme, https ]
              - [ :authority, www.example.com ]
              - [ :path, /valid-get ]
              - [ uuid, valid-get ]
          content:
            encoding: plain
            size: 0

        proxy-request:
          method: GET

        server-response:
          status: 200
          reason: OK
          content:
            encoding: plain
            data: response_to_valid_get
            size: 21

        proxy-response:
          status: 200
          content:
            verify: { value: "response_to_valid_get", as: contains }
  - protocol:
      stack: http2
      tls:
        sni: www.example.com
    transactions:
      - client-request:
          frames:
            - HEADERS:
                headers:
                  fields:
                    - [:method, CONNECT]
                    - [:authority, www.example.com:80]
                    - [uuid, valid-connect]
                    - [test, connect-request]
            - DATA:
                content:
                  encoding: plain
                  data: "GET /get HTTP/1.1\r\nuuid: valid-connect\r\ntest: real-request\r\n\r\n"

        # Note: the server will receive the tunneled GET request.
        proxy-request:
          method: GET

        server-response:
          status: 200
          reason: OK
          content:
            encoding: plain
            data: response_to_tunnelled_request
            size: 29

        proxy-response:
          status: 200
          content:
            verify: { value: "response_to_tunnelled_request", as: contains }
