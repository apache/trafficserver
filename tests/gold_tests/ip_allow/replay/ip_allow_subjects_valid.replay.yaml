meta:
  version: "1.0"

autest:
  description: 'Verify that exactly MAX_SUBJECTS (3 subjects) works without error'

  server:
    name: 'server-valid'

  client:
    name: 'client-valid'

  ats:
    name: 'ts-valid'

    process_config:
      enable_cache: false

    records_config:
      proxy.config.acl.subjects: 'PEER,PROXY,PLUGIN'

    remap_config:
      - from: "http://www.example.com/"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"

    log_validation:
      diags_log:
        excludes:
          - expression: "Too many ACL subjects were provided"
            description: "Should not log error when exactly MAX_SUBJECTS are configured"

sessions:
- transactions:

  - client-request:
      method: GET
      url: /get
      version: '1.1'
      headers:
        fields:
        - [Host, www.example.com]
        - [uuid, valid-subjects-request]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [Content-Length, "3"]
        - [Connection, close]
      content:
        data: "xxx"

    proxy-response:
      status: 200
