meta:
  version: "1.0"

autest:
  description: "Verify HTTP/3 transaction cleanup on active timeout"

  server:
    name: "server-h3-active-timeout"

  client:
    name: "client-h3-active-timeout"
    return_code: 1

  ats:
    name: "ts-h3-active-timeout"
    startup_timeout: 60
    process_config:
      enable_tls: true
      enable_quic: true

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: "quic|http"
      proxy.config.http.transaction_active_timeout_in: 1
      proxy.config.quic.no_activity_timeout_in: 0
      proxy.config.quic.server.stateless_retry_enabled: 0

    remap_config:
    - from: "https://example.com/"
      to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"

sessions:
- protocol:
  - name: http
    version: 3
  - name: tls
    sni: example.com
  - name: udp
  - name: ip

  transactions:
  - client-request:
      version: "3"
      headers:
        fields:
        - [ ":method", GET ]
        - [ ":scheme", https ]
        - [ ":authority", example.com ]
        - [ ":path", /h3-active-timeout ]
        - [ uuid, h3-active-timeout ]

    server-response:
      # Delay longer than the 1 second ATS active timeout configured by this replay.
      delay: 2s
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Type, text/plain ]
        - [ Content-Length, "100" ]
      content:
        encoding: plain
        data: "timeout-0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789abcdefghijklmnopqrst"

    proxy-response:
      status: 200
      headers:
        fields:
        - [ Content-Length, { value: "100", as: equal } ]
