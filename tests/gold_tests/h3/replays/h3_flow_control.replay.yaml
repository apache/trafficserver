meta:
  version: "1.0"

autest:
  description: "Verify HTTP/3 flow control with small QUIC windows"

  server:
    name: "server-h3-flow-control"
    process_config:
      verbose: false
      other_args: "--poll-timeout 30000"

  client:
    name: "client-h3-flow-control"
    process_config:
      verbose: false
      other_args: "--poll-timeout 30000"

  ats:
    name: "ts-h3-flow-control"
    startup_timeout: 60
    process_config:
      enable_tls: true
      enable_quic: true
      enable_cache: false

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: "quic|http3"
      proxy.config.quic.initial_max_data_in: 4096
      proxy.config.quic.initial_max_stream_data_bidi_remote_in: 4096
      proxy.config.quic.server.stateless_retry_enabled: 0

    remap_config:
    - from: "https://example.com/"
      to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"

    log_validation:
      traffic_out:
        contains:
        - expression: 'start HTTP/3 app \(ALPN=h3\)'
          description: "ATS should negotiate HTTP/3"

sessions:
- protocol:
    stack: http3
    tls:
      sni: example.com

  transactions:
  - client-request:
      version: "3"
      headers:
        fields:
        - [ ":method", POST ]
        - [ ":scheme", https ]
        - [ ":authority", example.com ]
        - [ ":path", /h3-flow-post-large ]
        - [ Content-Type, application/octet-stream ]
        - [ Content-Length, "300000" ]
        - [ uuid, h3-flow-post-large ]
      content:
        size: 300000

    proxy-request:
      headers:
        fields:
        - [ Content-Length, { value: "300000", as: equal } ]
      content:
        size: 300000

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Type, application/octet-stream ]
        - [ Content-Length, "300000" ]
      content:
        size: 300000

    proxy-response:
      status: 200
      headers:
        fields:
        - [ Content-Length, { value: "300000", as: equal } ]
      content:
        size: 300000

  - client-request:
      version: "3"
      headers:
        fields:
        - [ ":method", GET ]
        - [ ":scheme", https ]
        - [ ":authority", example.com ]
        - [ ":path", /h3-flow-get-large ]
        - [ uuid, h3-flow-get-large ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Type, application/octet-stream ]
        - [ Content-Length, "300000" ]
      content:
        size: 300000

    proxy-response:
      status: 200
      headers:
        fields:
        - [ Content-Length, { value: "300000", as: equal } ]
      content:
        size: 300000
