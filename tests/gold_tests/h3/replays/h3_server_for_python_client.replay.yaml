        - [ X-H3-Test-Case, py-head-no-body ]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Type, application/octet-stream ]
        - [ Content-Length, "0" ]

  - client-request:
      <<: *request_base
      method: GET
      url: /py-204-no-body
      headers:
        fields:
        - [ X-H3-Python-Client, aioquic ]
        - [ X-H3-Reused-Header, stable-python-qpack-value ]
        - [ uuid, py-204-no-body ]
        - [ X-H3-Test-Case, py-204-no-body ]

    server-response:
      status: 204
      reason: No Content
      headers:
        fields:
        - [ X-H3-Status, no-content ]

  - client-request:
      <<: *request_base
      method: POST
      url: /py-post-small
      headers:
        fields:
        - [ X-H3-Python-Client, aioquic ]
        - [ X-H3-Reused-Header, stable-python-qpack-value ]
        - [ Content-Type, application/octet-stream ]
        - [ Content-Length, "100" ]
        - [ uuid, py-post-small ]
        - [ X-H3-Test-Case, py-post-small ]
      content:
        size: 100
        verify: { as: equal }

    server-response:
      <<: *generated_100_response

  - client-request:
      <<: *request_base
      method: PUT
      url: /py-put-small
      headers:
        fields:
        - [ X-H3-Python-Client, aioquic ]
        - [ X-H3-Reused-Header, stable-python-qpack-value ]
