meta:
  version: "1.0"

  blocks:
  - request_base: &request_base
      version: "1.1"
  - empty_response: &empty_response
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, "0" ]
      content:
        size: 0
  - generated_100_response: &generated_100_response
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Type, application/octet-stream ]
        - [ Content-Length, "100" ]
      content:
        size: 100
  - generated_300k_response: &generated_300k_response
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Type, application/octet-stream ]
        - [ Content-Length, "300000" ]
      content:
        size: 300000

sessions:
- transactions:
  - client-request:
      <<: *request_base
      method: GET
      url: /py-get-empty
      headers:
        fields:
        - [ X-H3-Python-Client, aioquic ]
        - [ X-H3-Reused-Header, stable-python-qpack-value ]
        - [ uuid, py-get-empty ]
        - [ X-H3-Test-Case, py-get-empty ]

    server-response:
      <<: *empty_response

  - client-request:
      <<: *request_base
      method: GET
      url: /py-get-small
      headers:
        fields:
        - [ X-H3-Python-Client, aioquic ]
        - [ X-H3-Reused-Header, stable-python-qpack-value ]
        - [ uuid, py-get-small ]
        - [ X-H3-Test-Case, py-get-small ]

    server-response:
      <<: *generated_100_response

  - client-request:
      <<: *request_base
      method: HEAD
      url: /py-head-no-body
      headers:
