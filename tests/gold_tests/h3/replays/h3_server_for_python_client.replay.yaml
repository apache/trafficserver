      headers:
        fields:
        - [ X-H3-Status, delete-no-content ]

  - client-request:
      <<: *request_base
      method: OPTIONS
      url: /py-options-small
      headers:
        fields:
        - [ X-H3-Python-Client, aioquic ]
        - [ X-H3-Reused-Header, stable-python-qpack-value ]
        - [ uuid, py-options-small ]
        - [ X-H3-Test-Case, py-options-small ]

    server-response:
      <<: *generated_100_response

