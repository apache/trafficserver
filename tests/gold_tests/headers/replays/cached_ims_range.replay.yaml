meta:
  version: "1.0"

  blocks:
    - origin_response_should_not_be_used: &origin_response_should_not_be_used
        server-response:
          status: 500
          reason: "Internal Server Error"
          headers:
            fields:
              - [Content-Length, 16]
          content:
            encoding: plain
            data: "origin-should-not"

autest:
  description: 'Verify IMS and INM cache revalidation, range revalidation, and regex-remap 304 handling'

  server:
    name: 'cached-ims-range-server'

  client:
    name: 'cached-ims-range-client'

  ats:
    name: 'ts-cached-ims-range'
    process_config:
      enable_cache: true
      enable_tls: true

    plugin_config:
      - 'xdebug.so --enable=x-cache,x-cache-key,via'

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'http'
      proxy.config.http.response_via_str: 3

    copy_to_config_dir:
      - 'maps.reg'

    remap_config:
      - from: "https://www.default304.test/"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"
        plugins:
          - name: "regex_remap.so"
            args:
              - "maps.reg"
              - "no-query-string"
              - "host"
      - from: "http://www.default304.test/"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"
        plugins:
          - name: "regex_remap.so"
            args:
              - "maps.reg"
              - "no-query-string"
              - "host"
      - from: "/"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"

sessions:
  - transactions:
      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, Fill]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, fill-lmt]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Connection, close]
              - [Last-Modified, "Tue, 08 May 2018 15:49:41 GMT"]
              - [Cache-Control, max-age=1]
              - [Content-Length, 3]
          content:
            encoding: plain
            data: "xxx"

        proxy-response:
          status: 200
          headers:
            fields:
              - [X-Cache, { value: miss, as: equal }]
              - [Content-Length, { value: 3, as: equal }]
          content:
            verify:
              value: "xxx"
              as: equal

      - client-request:
          delay: 2s
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, IMS]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, ims-refresh]

        proxy-request:
          headers:
            fields:
              - [If-Modified-Since, { value: "Tue, 08 May 2018 15:49:41 GMT", as: equal }]

        server-response:
          status: 304
          reason: Not Modified
          headers:
            fields:
              - [Connection, close]
              - [Cache-Control, max-age=1]

        proxy-response:
          status: 200
          headers:
            fields:
              - [X-Cache, { value: hit-stale, as: equal }]
              - [Content-Length, { value: 3, as: equal }]
          content:
            verify:
              value: "xxx"
              as: equal

      - client-request:
          delay: 2s
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, IMS]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [Range, bytes=0-1]
              - [uuid, ims-range-refresh]

        server-response:
          status: 304
          reason: Not Modified
          headers:
            fields:
              - [Connection, close]
              - [Cache-Control, max-age=1]

        proxy-response:
          status: 206
          headers:
            fields:
              - [X-Cache, { value: hit-stale, as: equal }]
              - [Content-Length, { value: 2, as: equal }]
              - [Content-Range, { value: "bytes 0-1/3", as: equal }]
          content:
            verify:
              value: "xx"
              as: equal

      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.default304.test]
              - [uuid, default304-http]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 304

      - client-request:
          method: GET
          version: "1.1"
          url: /etag
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, EtagFill]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, fill-etag]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Connection, close]
              - [ETag, myetag]
              - [Cache-Control, max-age=1]
              - [Content-Length, 3]
          content:
            encoding: plain
            data: "xxx"

        proxy-response:
          status: 200
          content:
            verify:
              value: "xxx"
              as: equal

      - client-request:
          delay: 2s
          method: GET
          version: "1.1"
          url: /etag
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, INM]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, inm-refresh]

        proxy-request:
          headers:
            fields:
              - [If-None-Match, { value: myetag, as: equal }]

        server-response:
          status: 304
          reason: Not Modified
          headers:
            fields:
              - [Connection, close]
              - [ETag, myetag]
              - [Cache-Control, max-age=1]

        proxy-response:
          status: 200
          headers:
            fields:
              - [X-Cache, { value: hit-stale, as: equal }]
              - [ETag, { value: myetag, as: equal }]
          content:
            verify:
              value: "xxx"
              as: equal

      - client-request:
          delay: 2s
          method: GET
          version: "1.1"
          url: /etag
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, INM]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [Range, bytes=0-1]
              - [uuid, inm-range-refresh]

        server-response:
          status: 304
          reason: Not Modified
          headers:
            fields:
              - [Connection, close]
              - [ETag, myetag]
              - [Cache-Control, max-age=1]

        proxy-response:
          status: 206
          headers:
            fields:
              - [X-Cache, { value: hit-stale, as: equal }]
              - [ETag, { value: myetag, as: equal }]
              - [Content-Length, { value: 2, as: equal }]
              - [Content-Range, { value: "bytes 0-1/3", as: equal }]
          content:
            verify:
              value: "xx"
              as: equal

      - client-request:
          delay: 3s
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, noBody]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, nobody-refresh]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Connection, close]
              - [Content-Length, 0]
              - [Cache-Control, max-age=3]

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Length, { value: 0, as: equal }]
              - [Cache-Control, { value: max-age=3, as: equal }]

      - client-request:
          delay: 100ms
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, noBody]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, nobody-cache]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Length, { value: 0, as: equal }]
              - [Cache-Control, { value: max-age=3, as: equal }]

      - client-request:
          delay: 2s
          method: GET
          version: "1.1"
          url: /etag
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, EtagError]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, etag-error-refresh]

        server-response:
          status: 404
          reason: Not Found
          headers:
            fields:
              - [Connection, close]
              - [Content-Length, 0]
              - [Cache-Control, max-age=3]

        proxy-response:
          status: 404
          headers:
            fields:
              - [Content-Length, { value: 0, as: equal }]
              - [Cache-Control, { value: max-age=3, as: equal }]

      - client-request:
          delay: 100ms
          method: GET
          version: "1.1"
          url: /etag
          headers:
            fields:
              - [Host, www.example.com]
              - [UID, EtagError]
              - [x-debug, "x-cache,x-cache-key,via"]
              - [uuid, etag-error-cache]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 404
          headers:
            fields:
              - [Content-Length, { value: 0, as: equal }]
              - [Cache-Control, { value: max-age=3, as: equal }]

  - protocol:
      stack: https
      tls:
        sni: www.default304.test
    transactions:
      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.default304.test]
              - [uuid, default304-https]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 304

  - protocol:
      stack: http2
      tls:
        sni: www.default304.test
    transactions:
      - client-request:
          headers:
            fields:
              - [":method", GET]
              - [":scheme", https]
              - [":authority", www.default304.test]
              - [":path", /]
              - [uuid, default304-h2]

        <<: *origin_response_should_not_be_used

        proxy-response:
          headers:
            fields:
              - [":status", { value: "304", as: equal }]
