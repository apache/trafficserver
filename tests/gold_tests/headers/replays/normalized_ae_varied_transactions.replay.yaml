      # load an alternate of br Accept-Encoding header
      - client-request:
          method: "GET"
          version: "1.1"
          url: /case5
          headers:
            fields:
              - [Host, www.ae-4.com]
              - [X-Debug, x-cache]
              - [uuid, 44]
              - [Accept-Encoding, "br, compress"]
          delay: 100ms

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Transfer-Encoding, chunked]
              - [Cache-Control, max-age=300]
              - [Vary, Accept-Encoding]
              - [Connection, close]
              - [X-Response-Identifier, Br-Accept-Encoding]
          content:
            encoding: plain
            data: "br Accept-Encoding"

        proxy-response:
          status: 200
          headers:
            fields:
              - [
                  X-Response-Identifier,
                  { value: Br-Accept-Encoding, as: equal },
                ]
              - [X-Cache, { value: miss, as: equal }]

