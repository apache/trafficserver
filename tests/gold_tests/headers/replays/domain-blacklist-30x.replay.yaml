meta:
  version: "1.0"

  blocks:
    - origin_response_should_not_be_used: &origin_response_should_not_be_used
        server-response:
          status: 500
          reason: "Internal Server Error"
          headers:
            fields:
              - [Content-Length, 16]
          content:
            encoding: plain
            data: "origin-should-not"

autest:
  description: 'Verify header_rewrite redirects are returned for configured hosts'

  server:
    name: 'redirect-server'

  client:
    name: 'redirect-client'

  ats:
    name: 'ts-domain-redirects'

    process_config:
      disable_log_checks: true

    copy_to_config_dir:
      - 'rewrite_rules'

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'header_rewrite|dbg_header_rewrite'
      proxy.config.body_factory.enable_logging: 1

    remap_config:
      - >-
        regex_map http://www.redirect301.test/ http://www.redirect301.test/
        @plugin=header_rewrite.so
        @pparam=rewrite_rules/header_rewrite_rules_301.conf
      - >-
        regex_map http://www.redirect302.test/ http://www.redirect302.test/
        @plugin=header_rewrite.so
        @pparam=rewrite_rules/header_rewrite_rules_302.conf
      - >-
        regex_map http://www.redirect307.test/ http://www.redirect307.test/
        @plugin=header_rewrite.so
        @pparam=rewrite_rules/header_rewrite_rules_307.conf
      - >-
        regex_map http://www.redirect308.test/ http://www.redirect308.test/
        @plugin=header_rewrite.so
        @pparam=rewrite_rules/header_rewrite_rules_308.conf
      - >-
        regex_map http://www.redirect0.test/ http://www.redirect0.test/
        @plugin=header_rewrite.so
        @pparam=rewrite_rules/header_rewrite_rules_0.conf

    log_validation:
      diags_log:
        contains:
          - expression: 'unsupported redirect status 0'
            description: 'Verify the failure case for redirect status 0 is logged'

sessions:
  - transactions:
      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.redirect301.test]
              - [uuid, redirect-301]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 301
          headers:
            fields:
              - [Location, { value: "http://www.redirect301.test/", as: equal }]
              - [Cache-Control, { value: no-store, as: equal }]
          content:
            verify:
              value: 'The new location is "http://www.redirect301.test/".'
              as: contains

      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.redirect302.test]
              - [uuid, redirect-302]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 302
          headers:
            fields:
              - [Location, { value: "http://www.redirect302.test/", as: equal }]
              - [Cache-Control, { value: no-store, as: equal }]
          content:
            verify:
              value: 'The new location is "http://www.redirect302.test/".'
              as: contains

      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.redirect307.test]
              - [uuid, redirect-307]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 307
          headers:
            fields:
              - [Location, { value: "http://www.redirect307.test/", as: equal }]
              - [Cache-Control, { value: no-store, as: equal }]
          content:
            verify:
              value: 'The new location is "http://www.redirect307.test/".'
              as: contains

      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.redirect308.test]
              - [uuid, redirect-308]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 308
          headers:
            fields:
              - [Location, { value: "http://www.redirect308.test/", as: equal }]
              - [Cache-Control, { value: no-store, as: equal }]
          content:
            verify:
              value: 'The new location is "http://www.redirect308.test/".'
              as: contains

      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.redirect0.test]
              - [uuid, redirect-0]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 302
          headers:
            fields:
              - [Location, { value: "http://www.redirect0.test/", as: equal }]
              - [Cache-Control, { value: no-store, as: equal }]
          content:
            verify:
              value: 'The new location is "http://www.redirect0.test/".'
              as: contains

      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.passthrough.test]
              - [uuid, passthrough-404]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 404
          headers:
            fields:
              - [Cache-Control, { value: no-store, as: equal }]
              - [Content-Type, { value: text/html, as: contains }]
          content:
            verify:
              value: "Not Found on Accelerator"
              as: contains
