meta:
  version: "1.0"

autest:
  description: 'Reject malformed Host headers with multiple port separators'

  server:
    name: 'server'

  client:
    name: 'client'

  ats:
    name: 'ts'

    process_config:
      enable_cache: false

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'http'

    remap_config:
      - from: "/"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"

sessions:
- transactions:
  - client-request:
      method: GET
      version: '1.1'
      url: /malformed-host
      headers:
        fields:
        - [Host, "example.com:8080:9090:1234"]
        - [uuid, malformed-host]

    # This malformed request should be rejected by ATS before reaching origin.
    # If ATS forwards it anyway, the origin will reply 200 and the test will
    # fail because the proxy response is expected to be 400.
    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [Content-Length, "0"]

    proxy-response:
      status: 400

  - client-request:
      method: GET
      version: '1.1'
      url: /healthy-afterward
      headers:
        fields:
        - [Host, example.com]
        - [uuid, healthy-afterward]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [Content-Length, "0"]

    proxy-response:
      status: 200
