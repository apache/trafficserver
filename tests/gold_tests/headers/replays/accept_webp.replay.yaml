meta:
  version: "1.0"

  blocks:
    - origin_response_should_not_be_used: &origin_response_should_not_be_used
        server-response:
          status: 500
          reason: "Internal Server Error"
          headers:
            fields:
              - [Content-Length, 16]
          content:
            encoding: plain
            data: "origin-should-not"

autest:
  description: 'Verify cached image/webp responses are not reused for non-webp clients'

  server:
    name: 'accept-webp-server'

  client:
    name: 'accept-webp-client'

  ats:
    name: 'ts-accept-webp'
    process_config:
      enable_cache: true

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'http_match'
      proxy.config.http.cache.ignore_accept_mismatch: 0
      proxy.config.http.insert_response_via_str: 3
      proxy.config.http.cache.http: 1
      proxy.config.http.wait_for_cache: 1

    remap_config:
      - from: "http://www.example.com/"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/"

sessions:
  - transactions:
      - client-request:
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [Accept, "image/webp,image/png,image/svg+xml,image/*;q=0.8,video/*;q=0.8,*/*;q=0.5"]
              - [uuid, webp-origin]

        proxy-request:
          headers:
            fields:
              - [Accept, { value: "image/webp,image/png,image/svg+xml,image/*;q=0.8,video/*;q=0.8,*/*;q=0.5", as: equal }]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Connection, close]
              - [Content-Type, image/webp]
              - [Cache-Control, "max-age=300"]
              - [Content-Length, 3]
          content:
            encoding: plain
            data: "xxx"

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Type, { value: image/webp, as: equal }]
              - [Cache-Control, { value: max-age=300, as: equal }]
          content:
            verify:
              value: "xxx"
              as: equal

      - client-request:
          delay: 100ms
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [Accept, "image/webp,image/png,image/svg+xml,image/*;q=0.8,video/*;q=0.8,*/*;q=0.5"]
              - [uuid, webp-cache]

        <<: *origin_response_should_not_be_used

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Type, { value: image/webp, as: equal }]
              - [Cache-Control, { value: max-age=300, as: equal }]
          content:
            verify:
              value: "xxx"
              as: equal

      - client-request:
          delay: 100ms
          method: GET
          version: "1.1"
          url: /
          headers:
            fields:
              - [Host, www.example.com]
              - [Accept, "image/png,image/svg+xml,image/*;q=0.8,video/*;q=0.8,*/*;q=0.5"]
              - [uuid, no-webp-origin]

        proxy-request:
          headers:
            fields:
              - [Accept, { value: "image/png,image/svg+xml,image/*;q=0.8,video/*;q=0.8,*/*;q=0.5", as: equal }]

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Connection, close]
              - [Content-Type, image/webp]
              - [Cache-Control, "max-age=300"]
              - [Content-Length, 3]
          content:
            encoding: plain
            data: "yyy"

        proxy-response:
          status: 200
          headers:
            fields:
              - [Content-Type, { value: image/webp, as: equal }]
              - [Cache-Control, { value: max-age=300, as: equal }]
          content:
            verify:
              value: "yyy"
              as: equal
