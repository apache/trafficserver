meta:
  version: "1.0"

autest:
  description: "Verify client-supplied @ headers are stripped before global plugin and remap hooks run"

  at_headers:
    global_path: &global_path "/global"
    remap_path: &remap_path "/remap"
    global_request_probe: &global_request_probe "@Client-Test"
    response_probe: &response_probe "@Origin-Test"
    request_added: &request_added "@Plugin-Request"
    response_added: &response_added "@Plugin-Response"
    remap_request_probe: &remap_request_probe "@Client-Remap-Test"

  server:
    name: "server"

  client:
    name: "client"

  ats:
    name: "ts"

    process_config:
      enable_cache: false
      # There will be errors concerning the external @ heaers.
      disable_log_checks: true

    plugin_config:
      - name: "at_header_probe.so"
        args:
          - *global_request_probe
          - *response_probe
          - *request_added
          - *response_added

    copy_custom_plugin:
      - "plugins/.libs/at_header_probe.so"

    remap_config:
      - "map /global http://127.0.0.1:{SERVER_HTTP_PORT}/global"
      - from: "/remap"
        to: "http://127.0.0.1:{SERVER_HTTP_PORT}/remap"
        plugins:
          - name: "at_header_probe.so"
            args:
              - *remap_request_probe

    metric_checks:
      - metric: "proxy.process.http.client_request_at_headers_stripped"
        value: 2
      - metric: "proxy.process.http.origin_response_at_headers_stripped"
        value: 2

    log_validation:
      diags_log:
        contains:
          - expression: "stripped internal @ header from client request: @client-test"
            description: "Client-side @ header removals should be logged."
          - expression: "stripped internal @ header from origin response: @origin-test"
            description: "Origin-side @ header removals should be logged."
          - expression: "stripped internal @ header from client request: @client-remap-test"
            description: "Client-side @ header removals should be logged before remap plugins run."
        excludes:
          - expression: "saw unexpected request header"
            description: "Plugins should not see client-supplied @ headers."
          - expression: "saw unexpected response header"
            description: "Plugins should not see origin-supplied @ headers."
          - expression: "saw unexpected remap request header"
            description: "Remap plugins should not see client-supplied @ headers."
          - expression: "FATAL:"
            description: "ATS should not log fatal errors while stripping @ headers."

sessions:
  - transactions:
      - client-request:
          method: "GET"
          url: *global_path
          version: "1.1"
          headers:
            fields:
              - [Host, example.com]
              - [*global_request_probe, spoofed-value]
              - [X-Normal, keep-me]
              - [uuid, at-header-global-client]

        proxy-request:
          method: "GET"
          url: *global_path
          headers:
            fields:
              - [*global_request_probe, {as: absent}]
              - [*request_added, {as: absent}]
              - [X-Normal, {value: keep-me, as: equal}]

        server-response:
          status: 200
          reason: "OK"
          headers:
            fields:
              - [*response_probe, spoofed-response]
              - [Content-Length, "0"]

        proxy-response:
          status: 200
          headers:
            fields:
              - [*response_probe, {as: absent}]
              - [*response_added, {as: absent}]

      - client-request:
          method: "GET"
          url: *remap_path
          version: "1.1"
          headers:
            fields:
              - [Host, example.com]
              - [*remap_request_probe, spoofed-value]
              - [X-Normal, keep-me]
              - [uuid, at-header-remap-client]

        proxy-request:
          method: "GET"
          url: *remap_path
          headers:
            fields:
              - [*remap_request_probe, {as: absent}]
              - [*request_added, {as: absent}]
              - [X-Normal, {value: keep-me, as: equal}]

        server-response:
          status: 200
          reason: "OK"
          headers:
            fields:
              - [*response_probe, spoofed-remap-response]
              - [Content-Length, "0"]

        proxy-response:
          status: 200
          headers:
            fields:
              - [*response_probe, {as: absent}]
              - [*response_added, {as: absent}]
