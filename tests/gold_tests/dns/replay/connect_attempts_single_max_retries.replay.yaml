meta:
  version: "1.0"

# Configuration section for autest integration
autest:
  description: 'Verify connect attempts behavior - no round-robin (single host)'

  dns:
    name: 'dns-single-retries'
    records: {"backend.example.com": ["0.0.0.1"]}

  server:
    name: 'server-single-retries'

  client:
    name: 'client-single-retries'
    process_config:
      poll_timeout: 10000 # ms

  ats:
    name: 'ts-single-retries'
    process_config:
      enable_cache: false

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'http|hostdb|dns'
      proxy.config.http.connect_attempts_rr_retries: 99 # make sure this doesn't affect this case
      proxy.config.http.connect_attempts_max_retries: 2
      proxy.config.http.connect_attempts_max_retries_suspect_server: 1
      proxy.config.http.connect_attempts_timeout: 1
      proxy.config.http.down_server.cache_time: 3

    remap_config:
      - from: "http://example.com/"
        to: "http://backend.example.com:{SERVER_HTTP_PORT}/"

    log_validation:
      error_log:
        gold_file: "gold/connect_attempts_single_max_retries_error_log.gold"

sessions:
- transactions:
  # First request: ATS attempts 3 times (1 initial + 2 retries) to connect to 0.0.0.1.
  # The server is marked as down and ATS returns 502.
  - client-request:
      method: GET
      url: /path/
      version: '1.1'
      headers:
        fields:
        - [Host, example.com]
        - [uuid, 1]

    # should not hit
    server-response:
      status: 200
      reason: OK

    proxy-response:
      status: 502

  # Second request: within down_server.cache_time=3s so the server is still marked down.
  # ATS skips the connection attempt entirely and returns 500.
  - client-request:
      method: GET
      url: /path/
      version: '1.1'
      headers:
        fields:
        - [Host, example.com]
        - [uuid, 2]

    # should not hit
    server-response:
      status: 200
      reason: OK

    proxy-response:
      status: 500

  # Third request: delayed 5s so the down_server.cache_time=3s has expired.
  # ATS attempts 2 times (1 initial + 1 retries) to connect to 0.0.0.1.
  # The server is marked as down again and ATS returns 502.
  - client-request:
      method: GET
      url: /path/
      version: '1.1'
      headers:
        fields:
        - [Host, example.com]
        - [uuid, 3]
      delay: 5s

    # should not hit
    server-response:
      status: 200
      reason: OK

    proxy-response:
      status: 502

  # Fourth request: within down_server.cache_time=3s so the server is still marked down.
  # ATS skips the connection attempt entirely and returns 500.
  - client-request:
      method: GET
      url: /path/
      version: '1.1'
      headers:
        fields:
        - [Host, example.com]
        - [uuid, 4]

    server-response:
      status: 200

    proxy-response:
      status: 500
