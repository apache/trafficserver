meta:
  version: "1.0"

autest:
  description: 'Verify ATS rejects unspecified length POST requests with a 411.'

  dns:
    name: 'dns'

  server:
    name: 'server'

  client:
    name: 'client'

  ats:
    name: 'ts'
    process_config:
      enable_cache: false

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'http|http_trans'

    remap_config:
      - from: "http://example.com/"
        to: "http://backend.example.com:{SERVER_HTTP_PORT}/"

sessions:
- transactions:
  - client-request:
      method: "POST"
      version: "1.1"
      url: /no-cl
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, post-no-cl ]

    proxy-request:
      expect: absent

    proxy-response:
      status: 411
