meta:
  version: "1.0"

# This test proves that multi-parameter storage.yaml volume entries are parsed
# correctly. The generated storage.yaml contains:
#
#   cache:
#     volumes:
#       - id: 1
#         scheme: http
#         size: 50%
#         ram_cache_size: 32M
#         ram_cache_cutoff: 8K
#       - id: 2
#         scheme: http
#         size: 50%
#
# All volume parameters must be parsed correctly from the YAML format.
autest:
  description: "Test cache volume features: per-volume RAM cache and @volume= directive"

  dns:
    name: "dns"

  server:
    name: "server"

  client:
    name: "client"

  ats:
    name: "ts"

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: "cache|cache_hosting|ram_cache"
      proxy.config.cache.ram_cache.size: 128M
      proxy.config.cache.ram_cache_cutoff: 4K
      proxy.config.http.insert_response_via_str: 0
      proxy.config.cache.enable_read_while_writer: 0

    storage_yaml:
      cache:
        spans:
          - name: "disk-1"
            path: "var/trafficserver"
            size: "256M"
        volumes:
          # Volume 1 with all new parameters
          - id: 1
            scheme: "http"
            size: "50%"
            ram_cache_size: "32M"
            ram_cache_cutoff: "8K"
          # Volume 2 — simple volume, no extra params
          - id: 2
            scheme: "http"
            size: "50%"

    log_validation:
      traffic_out:
        excludes:
          # No storage.yaml volume entries should be discarded
          - expression: "discarding.*entry at line"
            description: "No storage.yaml volume entries should be discarded"

    remap_config:
      - from: "http://volume1.example.com/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/"
        options:
          - "@volume=1"
      - from: "http://volume2.example.com/"
        to: "http://backend.ex:{SERVER_HTTP_PORT}/"
        options:
          - "@volume=2"

# All transactions in a single session for sequential execution.
sessions:
- transactions:

  # Test 1: Request through volume 1 with per-volume RAM cache settings
  - client-request:
      method: "GET"
      version: "1.1"
      url: "/test1"
      headers:
        fields:
          - [Host, volume1.example.com]
          - [X-Test-ID, "volume1-ramcache-test"]
          - [uuid, 1]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
          - [Content-Type, "text/plain"]
          - [Cache-Control, "max-age=3600"]
          - [X-Volume-Test, "1"]
      content:
        data: "Content for volume 1 with custom RAM cache"

    proxy-response:
      status: 200
      headers:
        fields:
          - [X-Volume-Test, { value: "1", as: equal }]

  # Test 2: Request through volume 2 (simple volume, no extra params)
  - client-request:
      method: "GET"
      version: "1.1"
      url: "/test2"
      headers:
        fields:
          - [Host, volume2.example.com]
          - [X-Test-ID, "volume2-test"]
          - [uuid, 2]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
          - [Content-Type, "text/plain"]
          - [Cache-Control, "max-age=3600"]
          - [X-Volume-Test, "2"]
      content:
        data: "Content for volume 2"

    proxy-response:
      status: 200
      headers:
        fields:
          - [X-Volume-Test, { value: "2", as: equal }]

