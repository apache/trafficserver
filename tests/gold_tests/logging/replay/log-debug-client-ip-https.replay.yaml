meta:
  version: "1.0"

autest:
  description: 'Verify client-IP-filtered debug logging for HTTPS'

  server:
    name: 'server-log-debug-client-ip-https'

  client:
    name: 'client-log-debug-client-ip-https'

  ats:
    name: 'ts-log-debug-client-ip-https'
    process_config:
      enable_cache: false
      enable_tls: true

    records_config:
      proxy.config.diags.debug.enabled: 2
      proxy.config.diags.debug.tags: 'http'
      proxy.config.diags.debug.client_ip: '127.0.0.1'

    remap_config:
    - from: 'https://debug-client-ip-https.test/'
      to: 'http://127.0.0.1:{SERVER_HTTP_PORT}/'

    log_validation:
      traffic_out:
        contains:
        - expression: '\+ Incoming Request \+(?:(?!\+ Proxy''s Request after hooks \+)[\s\S])*?uuid: log-debug-https-1'
          description: 'HTTPS transaction 1 logs the incoming request headers.'
          multiline: true
        - expression: '\+ Proxy''s Request after hooks \+(?:(?!\+ Incoming O.S. Response \+)[\s\S])*?uuid: log-debug-https-1'
          description: 'HTTPS transaction 1 logs the proxy request headers after hooks.'
          multiline: true
        - expression: '\+ Incoming O.S. Response \+(?:(?!\+ Proxy''s Response 2 \+)[\s\S])*?uuid: log-debug-https-1'
          description: 'HTTPS transaction 1 logs the incoming origin response headers.'
          multiline: true
        - expression: '\+ Proxy''s Response 2 \+(?:(?!\+ Incoming Request \+)[\s\S])*?uuid: log-debug-https-1'
          description: 'HTTPS transaction 1 logs the proxy response headers.'
          multiline: true
        - expression: '\+ Incoming Request \+(?:(?!\+ Proxy''s Request after hooks \+)[\s\S])*?uuid: log-debug-https-2'
          description: 'HTTPS transaction 2 logs the incoming request headers.'
          multiline: true
        - expression: '\+ Proxy''s Request after hooks \+(?:(?!\+ Incoming O.S. Response \+)[\s\S])*?uuid: log-debug-https-2'
          description: 'HTTPS transaction 2 logs the proxy request headers after hooks.'
          multiline: true
        - expression: '\+ Incoming O.S. Response \+(?:(?!\+ Proxy''s Response 2 \+)[\s\S])*?uuid: log-debug-https-2'
          description: 'HTTPS transaction 2 logs the incoming origin response headers.'
          multiline: true
        - expression: '\+ Proxy''s Response 2 \+(?:(?!\+ Incoming Request \+)[\s\S])*?uuid: log-debug-https-2'
          description: 'HTTPS transaction 2 logs the proxy response headers.'
          multiline: true

sessions:
- protocol:
    stack: https
    tls:
      sni: debug-client-ip-https.test
  transactions:
  - client-request:
      method: GET
      url: /debug-https-1
      version: '1.1'
      headers:
        fields:
        - [Host, debug-client-ip-https.test]
        - [Content-Length, 0]
        - [uuid, log-debug-https-1]

    proxy-request:
      headers:
        fields:
        - [uuid, { value: log-debug-https-1, as: equal }]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [Content-Length, 0]
        - [uuid, log-debug-https-1]

    proxy-response:
      status: 200
      headers:
        fields:
        - [uuid, { value: log-debug-https-1, as: equal }]

  - client-request:
      method: GET
      url: /debug-https-2
      version: '1.1'
      headers:
        fields:
        - [Host, debug-client-ip-https.test]
        - [Content-Length, 0]
        - [uuid, log-debug-https-2]

    proxy-request:
      headers:
        fields:
        - [uuid, { value: log-debug-https-2, as: equal }]

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [Content-Length, 0]
        - [uuid, log-debug-https-2]

    proxy-response:
      status: 200
      headers:
        fields:
        - [uuid, { value: log-debug-https-2, as: equal }]
